{% extends 'journal/base.html' %}
{% block content %}
<div style="max-width:400px; margin:2rem auto 0;">
  <h1 style="font-size:1.8rem; margin-bottom:0.3rem;">Create your journal</h1>
  <p style="color:var(--muted); margin-bottom:2rem;">A private space for your thoughts.</p>

  <form method="post">
    {% csrf_token %}
    {% if form.errors %}
      <p style="color:#e07a5f; margin-bottom:1rem; font-size:0.9rem;">Please fix the errors below.</p>
    {% endif %}
    <div style="margin-bottom:1rem;">
      <label style="display:block; margin-bottom:0.4rem; font-size:0.9rem;">Username</label>
      <input type="text" name="username" required style="width:100%; padding:0.7rem; border-radius:4px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:var(--paper);">
    </div>
    <div style="margin-bottom:1rem;">
      <label style="display:block; margin-bottom:0.4rem; font-size:0.9rem;">Password</label>
      <input type="password" name="password1" required style="width:100%; padding:0.7rem; border-radius:4px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:var(--paper);">
    </div>
    <div style="margin-bottom:1.5rem;">
      <label style="display:block; margin-bottom:0.4rem; font-size:0.9rem;">Confirm password</label>
      <input type="password" name="password2" required style="width:100%; padding:0.7rem; border-radius:4px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:var(--paper);">
    </div>
    <button type="submit" class="btn" style="width:100%;">Sign up</button>
  </form>
  <p style="margin-top:1.2rem; font-size:0.9rem; color:var(--muted);">
    Already have an account? <a href="{% url 'login' %}" style="color:var(--gold);">Log in</a>
  </p>
</div>
{% endblock %}
