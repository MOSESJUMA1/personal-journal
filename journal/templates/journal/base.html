<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Personal Journal{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14171F;
    --paper: #F6F1E7;
    --paper-text: #2A2620;
    --gold: #C9A227;
    --muted: #8B8677;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  h1, h2, h3, .brand { font-family: 'Fraunces', serif; }
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .brand { font-size: 1.3rem; font-weight: 600; color: var(--gold); letter-spacing: 0.02em; }
  nav a { color: var(--paper); text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; opacity: 0.85; }
  nav a:hover { opacity: 1; color: var(--gold); }
  main { max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem; }
  .btn {
    display: inline-block; background: var(--gold); color: var(--ink);
    padding: 0.7rem 1.4rem; border-radius: 4px; text-decoration: none;
    font-weight: 600; border: none; cursor: pointer; font-size: 0.95rem;
  }
  .btn:hover { opacity: 0.9; }
</style>
</head>
<body>
<nav>
  <span class="brand">Marrow</span>
  <div>
    {% if user.is_authenticated %}
      <a href="{% url 'new_entry' %}">New entry</a>
      <a href="{% url 'logout' %}">Log out</a>
    {% else %}
      <a href="{% url 'login' %}">Log in</a>
      <a href="{% url 'signup' %}">Sign up</a>
    {% endif %}
  </div>
</nav>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
